shops:
  - name: "Ackermann"
    source_type: "html"
    cleaner: "ackermann"
    base_url: "https://www.ackermann.ch"
    categories:
      - category: "smartphone"
        url: 'https://www.ackermann.ch/technik/multimedia/smartphones-telefone/?f={base64_start}{"filter_Kategorie":["fb_ktgr_mblt.fn_d8"],"filter_price":["{min_price}-{max_price}"]}{base64_end}&o=price-asc'
        max_pages: 1
        selectors:
          product_card: "li.product-card"
          title_prefix: ".product-card-brand"
          title: ".product-card-name"
          price: ".price-value"
          old_price: ".price-strike"
          url: ".product-card-name[href]"
          image: ".product-card-image img[src]"
        currency: "CHF"

  - name: "Alltron"
    source_type: "json"
    cleaner: "alltron"
    base_url: "https://alltron.ch"
    headers:
      accept-language: "de"
      accept: "application/json"
      x-requested-with: "XMLHttpRequest"
    categories:
      - category: "smartphone"
        url: "https://alltron.ch/api/v1/catalog/search?path=%2Ftelco-ucc%2Fmobiltelefonie%2Fsmartphones&limit=48&page=1&sortProducts=priceasc&filters=availability%3A%3A%3AVerf%C3%BCgbar%7C%7C%7Cprice_standard%3A%3A%3A{min_price}~~~{max_price}&listView=listshop&searchEarlyFilter=true&format=json"
        max_pages: 1
        fields:
          products: "products"
          url: "sku"
        url_template: "https://alltron.ch/de/product/{id}"
        price_api:
          url: "https://alltron.ch/api/v1/products/multiple-tiles/{ids}"
          headers:
            accept-language: "de"
            accept: "application/json"
            x-requested-with: "XMLHttpRequest"
          price_path: "effectivePricing.userPrice"
          old_price_path: "effectivePricing.mainPrice"
          title_path: "description.title"
          image_path: "cover.sizes.0.link"
        currency: "CHF"

  - name: "Amazon"
    source_type: "html"
    cleaner: "amazon"
    base_url: "https://www.amazon.de"
    categories:
      - category: "smartphone"
        url: "https://www.amazon.de/s?k=smartphone&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div[data-component-type='s-search-result']"
          title: "h2 a span"
          price: "span.a-price span.a-offscreen"
          old_price: "span.a-price[data-a-strike] span.a-offscreen"
          url: "h2 a[href]"
          image: "img.s-image[src]"
        currency: "EUR"

