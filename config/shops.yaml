shops:
  - name: "Amazon"
    source_type: "html"
    cleaner: "amazon"
    base_url: "https://www.amazon.de"
    categories:
      - category: "smartphone"
        url: "https://www.amazon.de/s?k=smartphone&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div[data-component-type='s-search-result']"
          title: "h2 a span"
          price: "span.a-price span.a-offscreen"
          old_price: "span.a-price[data-a-strike] span.a-offscreen"
          url: "h2 a[href]"
          image: "img.s-image[src]"
        currency: "EUR"

  - name: "Galaxus"
    source_type: "json"
    method: "POST"
    cleaner: "galaxus"
    headers:
      content-type: "application/json"
      apollo-require-preflight: "true"
      origin: "https://www.galaxus.ch"
      referer: "https://www.galaxus.ch/"
      accept: "application/json"
      accept-language: "de-CH,de;q=0.9,en;q=0.8"
    categories:
      - category: "smartphone"
        url: "https://www.galaxus.ch/api/graphql/product-type-filter-products"
        body_template: "templates/galaxus_smartphone.json"
        max_pages: 5
        pagination:
          type: "offset"
          param: "offset"
          per_page: 24
        fields:
          products: "data.productType.filterProducts.products.results"
          title: "product.name"
          price: "offer.price.amountInclusive"
          old_price: "offer.insteadOfPrice.price.amountInclusive"
          url: "product.productId"
          image: "product.imageUrl"
        currency: "CHF"

  - name: "Ackermann"
    source_type: "html"
    cleaner: "ackermann"
    base_url: "https://www.ackermann.ch"
    categories:
      - category: "smartphone"
        url: "https://www.ackermann.ch/technik/multimedia/smartphones-telefone/?f=eyJmaWx0ZXJfUHJvZHVrdHR5cF8xIjpbImZiX3ByZGt0LnAxX3NtcnQuaG5fMzgiXSwiZmlsdGVyX3ByaWNlIjpbIjUwLTM1MCJdfQ%3D%3D&o=price-asc"
        max_pages: 1
        selectors:
          product_card: "li.product-card"
          title: ".product-card-name"
          price: ".price-value"
          old_price: ".price-strike"
          url: ".product-card-name[href]"
          image: ".product-card-image img[src]"
        currency: "CHF"
