shops:
  - name: "Amazon"
    source_type: "html"
    cleaner: "amazon"
    base_url: "https://www.amazon.de"
    categories:
      - category: "smartphone"
        url: "https://www.amazon.de/s?k=smartphone&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div[data-component-type='s-search-result']"
          title: "h2 a span"
          price: "span.a-price span.a-offscreen"
          old_price: "span.a-price[data-a-strike] span.a-offscreen"
          url: "h2 a[href]"
          image: "img.s-image[src]"
        currency: "EUR"

  - name: "Galaxus"
    source_type: "json"
    method: "POST"
    cleaner: "galaxus"
    headers:
      content-type: "application/json"
      apollo-require-preflight: "true"
      origin: "https://www.galaxus.ch"
      referer: "https://www.galaxus.ch/"
      accept: "application/json"
      accept-language: "de-CH,de;q=0.9,en;q=0.8"
    categories:
      - category: "smartphone"
        url: "https://www.galaxus.ch/api/graphql/product-type-filter-products"
        body_template: "templates/galaxus_smartphone.json"
        max_pages: 5
        pagination:
          type: "offset"
          param: "offset"
          per_page: 24
        fields:
          products: "data.productType.filterProducts.products.results"
          title: "product.name"
          price: "offer.price.amountInclusive"
          old_price: "offer.insteadOfPrice.price.amountInclusive"
          url: "product.productId"
          image: "product.imageUrl"
        currency: "CHF"

  - name: "Ackermann"
    source_type: "html"
    cleaner: "ackermann"
    base_url: "https://www.ackermann.ch"
    categories:
      - category: "smartphone"
        url: "https://www.ackermann.ch/technik/multimedia/smartphones-telefone/?f=eyJmaWx0ZXJfUHJvZHVrdHR5cF8xIjpbImZiX3ByZGt0LnAxX3NtcnQuaG5fMzgiXSwiZmlsdGVyX3ByaWNlIjpbIjUwLTM1MCJdfQ%3D%3D&o=price-asc"
        max_pages: 1
        selectors:
          product_card: "li.product-card"
          title: ".product-card-name"
          price: ".price-value"
          old_price: ".price-strike"
          url: ".product-card-name[href]"
          image: ".product-card-image img[src]"
        currency: "CHF"

  - name: "Brack"
    source_type: "html"
    cleaner: "brack"
    base_url: "https://www.brack.ch"
    categories:
      - category: "smartphone"
        url: "https://www.brack.ch/it-multimedia/smartphone?filter%5Bavailability%5D%5B%5D=Verf%C3%BCgbar&filter%5Bprice_standard%5D%5B%5D=50~~~350&sortProducts=priceasc&query=*"
        max_pages: 1
        json_selector: "script#b2c-search-products"
        price_divisor: 100
        fields:
          products: "productDataMap"
          title_prefix: "manufacturer.name"
          title: "description.nameWithoutManufacturer"
          price: "price.priceWithVat"
          old_price: "price.standardPrice.priceWithVat"
          url: "url"
          image: "images.0.sizes.0.src"
        currency: "CHF"

  - name: "Conrad"
    source_type: "json"
    method: "POST"
    cleaner: "conrad"
    base_url: "https://www.conrad.ch"
    headers:
      content-type: "application/json"
    categories:
      - category: "smartphone"
        url: "https://api.conrad.ch/search/1/v3/facetSearch/ch/de/b2c?apikey=2cHbdksbmXc6PQDkPzRVFOcdladLvH7w"
        body_template: "templates/conrad_search.json"
        max_pages: 1
        fields:
          products: "hits"
          title: "title"
          url: "productId"
          image: "image"
        price_api:
          url: "https://api.conrad.ch/price-availability/4/CQ_CH_B2C/facade?apikey=2cHbdksbmXc6PQDkPzRVFOcdladLvH7w&forceStorePrice=false&overrideCalculationSchema=GROSS"
          body_template: "templates/conrad_prices.json"
          headers:
            content-type: "application/json"
            accept: "application/json"
          products_path: "priceAndAvailabilityFacadeResponse.products.product"
          id_path: "articleId"
          price_path: "offers.offer.price.price"
          old_price_path: "offers.offer.price.crossedOutPrice"
        currency: "CHF"

  - name: "Foletti"
    source_type: "html"
    cleaner: "foletti"
    base_url: "https://superstore.foletti.com"
    categories:
      - category: "smartphone"
        url: "https://superstore.foletti.com/de/categories/it--multimedia/telekommunikation/mobiltelefone/smartphone?price-min=50&price-max=350&limit=100&sort=price|asc&listStyle=list&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div.item.card"
          title: "span.productName a"
          price: "span.first_price span.price"
          old_price: "span.second_price span.price"
          url: "h4 a[href]"
          image: "img.img-fluid[src]"
        currency: "CHF"

  - name: "Interdiscount"
    source_type: "json"
    cleaner: "interdiscount"
    base_url: "https://www.interdiscount.ch"
    headers:
      accept: "application/json"
      accept-language: "de-CH,de;q=0.9"
      referer: "https://www.interdiscount.ch/"
      origin: "https://www.interdiscount.ch"
    categories:
      - category: "smartphone"
        url: "https://www.interdiscount.ch/idocc/occ/id/products/search?currentPage=0&pageSize=100&query=:price-asc:categoryPath:/1/400/4100:categoryPath:/1/400/4100/411000:price_min:50:price_max:350:producttype411001k:Smartphone&lang=de"
        max_pages: 1
        fields:
          products: "products"
          title: "name"
          price: "productPriceData.prices.0.finalPrice.value"
          old_price: "productPriceData.prices.0.insteadPrice.value"
          url: "code"
        currency: "CHF"

  - name: "Mediamarkt"
    source_type: "html"
    cleaner: "mediamarkt"
    base_url: "https://www.mediamarkt.ch"
    categories:
      - category: "smartphone"
        url: "https://www.mediamarkt.ch/de/category/smartphone-680815.html?filter=currentprice:50-350&sort=currentprice+asc&page={page}"
        max_pages: 5
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "[data-test='mms-product-card']"
          title: "[data-test='product-title']"
          price: "[data-test='mms-price'] span[aria-hidden='true']"
          old_price: "[data-test='mms-strike-price-type-rrp'] span[aria-hidden='true']"
          url: "a[href*='/de/product/']"
          image: "[data-test='product-image'][src]"
        currency: "CHF"
