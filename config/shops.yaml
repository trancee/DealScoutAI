  - name: "Brack"
    source_type: "html"
    cleaner: "brack"
    base_url: "https://www.brack.ch"
    categories:
      - category: "smartphones"
        url: "https://www.brack.ch/it-multimedia/handy-telefonie/smartphone-handy/smartphones?page={page}&limit=192&filter%5Bprice_standard%5D%5B%5D={min_price}~~~{max_price}&filter%5Bavailability%5D%5B%5D=Verf%C3%BCgbar"
        max_pages: 1
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        json_selector: "script#b2c-search-products"
        price_divisor: 100
        fields:
          products: "productDataMap"
          title_prefix: "manufacturer.name"
          title: "description.nameWithoutManufacturer"
          price: "price.priceWithVat"
          old_price: "price.standardPrice.priceWithVat"
          url: "url"
          image: "images.0.sizes.0.src"
        currency: "CHF"
      - category: "notebooks"
        url: "https://www.brack.ch/it-multimedia/computer-tablets/notebook?page={page}&limit=192&sortProducts=priceasc&filter%5Bprice_standard%5D%5B%5D={min_price}~~~{max_price}&filter%5BattributeGroupFacet_npu-neural-processing-unit%5D%5B%5D=Ja&filter%5BattributeGroupFacet_geraetetyp%5D%5B%5D=Notebook&filter%5BattributeUnitGroupFacet_bildschirmdiagonale-in-zoll%5D%5B%5D=15~~~17&filter%5BattributeUnitGroupFacet_verbauter-arbeitsspeicher%5D%5B%5D=32~~~128&filter%5Bavailability%5D%5B%5D=Verf%C3%BCgbar"
        max_pages: 1
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        json_selector: "script#b2c-search-products"
        price_divisor: 100
        fields:
          products: "productDataMap"
          title_prefix: "manufacturer.name"
          title: "description.nameWithoutManufacturer"
          price: "price.priceWithVat"
          old_price: "price.standardPrice.priceWithVat"
          url: "url"
          image: "images.0.sizes.0.src"
        currency: "CHF"
      - category: "monitors"
        url: "https://www.brack.ch/it-multimedia/peripherie-kabel/monitore?page={page}&limit=192&sortProducts=priceasc&filter%5Bprice_standard%5D%5B%5D={min_price}~~~{max_price}&filter%5BattributeGroupFacet_paneltyp%5D%5B%5D=OLED&filter%5BattributeGroupFacet_curved%5D%5B%5D=Ja&filter%5Bavailability%5D%5B%5D=Verf%C3%BCgbar"
        max_pages: 1
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        json_selector: "script#b2c-search-products"
        price_divisor: 100
        fields:
          products: "productDataMap"
          title_prefix: "manufacturer.name"
          title: "description.nameWithoutManufacturer"
          price: "price.priceWithVat"
          old_price: "price.standardPrice.priceWithVat"
          url: "url"
          image: "images.0.sizes.0.src"
        currency: "CHF"

  - name: "Conforama"
    source_type: "json"
    method: "POST"
    cleaner: "conforama"
    base_url: "https://www.conforama.ch"
    token_endpoint:
      url: "https://api.c4avqjtcp1-conforama1-p1-public.model-t.cc.commerce.ondemand.com/occ/v2/conforama/coveo/token/products"
      token_path: "token"
    headers:
      content-type: "application/json"
    categories:
      - category: "smartphones"
        url: "https://conforamasuissesaproductiona7ej0kj7.org.coveo.com/rest/organizations/conforamasuissesaproductiona7ej0kj7/commerce/v2/listing"
        body_template: "templates/conforama_smartphones.json"
        max_pages: 3
        pagination:
          type: "offset"
          per_page: 1
        fields:
          products: "products"
          title: "ec_name"
          title_suffix: "additionalFields.cf_product_subname"
          price: "ec_promo_price"
          old_price: "additionalFields.cf_product_price_baseprice"
          url: "clickUri"
          image: "ec_thumbnails.0"
