shops:
  - name: "Ackermann"
    source_type: "json"
    method: "POST"
    cleaner: "ackermann"
    base_url: "https://www.ackermann.ch"
    headers:
      content-type: "application/json"
      accept: "application/json"
    categories:
      - category: "smartphones"
        url: "https://www.ackermann.ch/api/gateway/"
        body_template: "templates/ackermann_smartphones.json"
        max_pages: 1
        pagination:
          type: "offset"
          per_page: 72
        price_divisor: 100
        fields:
          products: "data.category.items"
          title_prefix: "brand.name"
          title: "styleName"
          price: "primaryVariationGroup.price.currentPrice"
          old_price: "primaryVariationGroup.price.discount.previousPrice"
          url: "primaryVariationGroup.href"
          image: "primaryVariationGroup.image"
        currency: "CHF"
      - category: "notebooks"
        url: "https://www.ackermann.ch/api/gateway/"
        body_template: "templates/ackermann_notebooks.json"
        max_pages: 2
        pagination:
          type: "offset"
          per_page: 72
        price_divisor: 100
        fields:
          products: "data.category.items"
          title_prefix: "brand.name"
          title: "styleName"
          price: "primaryVariationGroup.price.currentPrice"
          old_price: "primaryVariationGroup.price.discount.previousPrice"
          url: "primaryVariationGroup.href"
          image: "primaryVariationGroup.image"
        currency: "CHF"
      - category: "monitors"
        url: "https://www.ackermann.ch/api/gateway/"
        body_template: "templates/ackermann_monitors.json"
        max_pages: 1
        pagination:
          type: "offset"
          per_page: 72
        price_divisor: 100
        fields:
          products: "data.category.items"
          title_prefix: "brand.name"
          title: "styleName"
          price: "primaryVariationGroup.price.currentPrice"
          old_price: "primaryVariationGroup.price.discount.previousPrice"
          url: "primaryVariationGroup.href"
          image: "primaryVariationGroup.image"
        currency: "CHF"

  - name: "Alltron"
    source_type: "json"
    cleaner: "alltron"
    base_url: "https://alltron.ch"
    headers:
      accept-language: "de"
      accept: "application/json"
      x-requested-with: "XMLHttpRequest"
    categories:
      - category: "smartphones"
        url: "https://alltron.ch/api/v1/catalog/search?path=%2Ftelco-ucc%2Fmobiltelefonie%2Fsmartphones&limit=48&page={page}&sortProducts=priceasc&filters=availability%3A%3A%3AVerf%C3%BCgbar%7C%7C%7Cprice_standard%3A%3A%3A{min_price}~~~{max_price}&listView=listshop&searchEarlyFilter=true&format=json"
        max_pages: 1
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        fields:
          products: "products"
          url: "sku"
        url_template: "https://alltron.ch/de/product/{id}"
        price_api:
          url: "https://alltron.ch/api/v1/products/multiple-tiles/{ids}"
          headers:
            accept-language: "de"
            accept: "application/json"
            x-requested-with: "XMLHttpRequest"
          price_path: "effectivePricing.userPrice"
          old_price_path: "effectivePricing.mainPrice"
          title_path: "description.title"
          image_path: "cover.sizes.0.link"
        currency: "CHF"
      - category: "notebooks"
        url: "https://alltron.ch/api/v1/catalog/search?path=%2Fcomputing-software%2Fpc-notebooks-tablets%2Fnotebook&limit=48&page={page}&sortProducts=priceasc&filters=availability%3A%3A%3AVerf%C3%BCgbar%7C%7C%7CattributeGroupFacet_npu-neural-processing-unit%3A%3A%3AJa%7C%7C%7CattributeUnitGroupFacet_verbauter-arbeitsspeicher%3A%3A%3A32~~~128%7C%7C%7CattributeUnitGroupFacet_bildschirmdiagonale-in-zoll%3A%3A%3A15~~~17%7C%7C%7CattributeGroupFacet_geraetetyp%3A%3A%3ANotebook%7C%7C%7Cprice_standard%3A%3A%3A{min_price}~~~{max_price}&listView=listshop&searchEarlyFilter=true&format=json"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        fields:
          products: "products"
          url: "sku"
        url_template: "https://alltron.ch/de/product/{id}"
        price_api:
          url: "https://alltron.ch/api/v1/products/multiple-tiles/{ids}"
          headers:
            accept-language: "de"
            accept: "application/json"
            x-requested-with: "XMLHttpRequest"
          price_path: "effectivePricing.userPrice"
          old_price_path: "effectivePricing.mainPrice"
          title_path: "description.title"
          image_path: "cover.sizes.0.link"
        currency: "CHF"
      - category: "monitors"
        url: "https://alltron.ch/api/v1/catalog/search?path=%2Fcomputing-software%2Fperipherie%2Fmonitore%2Fmonitore&limit=48&page={page}&sortProducts=priceasc&filters=availability%3A%3A%3AVerf%C3%BCgbar%7C%7C%7Cprice_standard%3A%3A%3A{min_price}~~~{max_price}%7C%7C%7CattributeGroupFacet_curved%3A%3A%3AJa%7C%7C%7CattributeGroupFacet_paneltyp%3A%3A%3AOLED%7C%7C%7CattributeGroupFacet_aufloesung%3A%3A%3A3840%20x%202160%20%28Ultra%20HD%204K%29&listView=listshop&searchEarlyFilter=true&format=json"
        max_pages: 1
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        fields:
          products: "products"
          url: "sku"
        url_template: "https://alltron.ch/de/product/{id}"
        price_api:
          url: "https://alltron.ch/api/v1/products/multiple-tiles/{ids}"
          headers:
            accept-language: "de"
            accept: "application/json"
            x-requested-with: "XMLHttpRequest"
          price_path: "effectivePricing.userPrice"
          old_price_path: "effectivePricing.mainPrice"
          title_path: "description.title"
          image_path: "cover.sizes.0.link"
        currency: "CHF"

