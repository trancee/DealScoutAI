      - category: "notebooks"
        url: "https://conforamasuissesaproductiona7ej0kj7.org.coveo.com/rest/organizations/conforamasuissesaproductiona7ej0kj7/commerce/v2/listing"
        body_template: "templates/conforama_notebooks.json"
        max_pages: 3
        pagination:
          type: "offset"
          per_page: 1
        fields:
          products: "products"
          title: "ec_name"
          title_suffix: "additionalFields.cf_product_subname"
          price: "ec_promo_price"
          old_price: "additionalFields.cf_product_price_baseprice"
          url: "clickUri"
          image: "ec_thumbnails.0"
        currency: "CHF"
      - category: "monitors"
        url: "https://conforamasuissesaproductiona7ej0kj7.org.coveo.com/rest/organizations/conforamasuissesaproductiona7ej0kj7/commerce/v2/listing"
        body_template: "templates/conforama_monitors.json"
        max_pages: 3
        pagination:
          type: "offset"
          per_page: 1
        fields:
          products: "products"
          title: "ec_name"
          title_suffix: "additionalFields.cf_product_subname"
          price: "ec_promo_price"
          old_price: "additionalFields.cf_product_price_baseprice"
          url: "clickUri"
          image: "ec_thumbnails.0"
        currency: "CHF"

  - name: "Conrad"
    source_type: "json"
    method: "POST"
    cleaner: "conrad"
    base_url: "https://www.conrad.ch"
    headers:
      content-type: "application/json"
    categories:
      - category: "smartphones"
        url: "https://api.conrad.ch/search/1/v3/facetSearch/ch/de/b2c?apikey=2cHbdksbmXc6PQDkPzRVFOcdladLvH7w"
        body_template: "templates/conrad_search.json"
        max_pages: 1
        fields:
          products: "hits"
          title: "title"
          url: "productId"
          image: "image"
        url_template: "https://www.conrad.ch/de/p/-{id}.html"
        price_api:
          url: "https://api.conrad.ch/price-availability/4/CQ_CH_B2C/facade?apikey=2cHbdksbmXc6PQDkPzRVFOcdladLvH7w&forceStorePrice=false&overrideCalculationSchema=GROSS"
          body_template: "templates/conrad_prices.json"
          headers:
            content-type: "application/json"
            accept: "application/json"
          products_path: "priceAndAvailabilityFacadeResponse.products.product"
          id_path: "articleId"
          price_path: "offers.offer.price.price"
          old_price_path: "offers.offer.price.crossedOutPrice"
        currency: "CHF"

  - name: "Foletti"
    source_type: "html"
    cleaner: "foletti"
    base_url: "https://superstore.foletti.com"
    categories:
      - category: "smartphones"
        url: "https://superstore.foletti.com/de/categories/it--multimedia/telekommunikation/mobiltelefone/smartphone?price-min={min_price}&price-max={max_price}&limit=100&sort=price|asc&listStyle=list&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div.item.card"
          title_prefix: "h4 a strong"
          title: "img.img-fluid[alt]"
          price: "span.first_price span.price"
          old_price: "span.second_price span.price"
          url: "h4 a[href]"
          image: "img.img-fluid[src]"
        currency: "CHF"

  - name: "Interdiscount"
    source_type: "json"
    cleaner: "interdiscount"
    base_url: "https://www.interdiscount.ch"
    headers:
      accept: "application/json"
      accept-language: "de-CH,de;q=0.9"
      referer: "https://www.interdiscount.ch/"
      origin: "https://www.interdiscount.ch"
    categories:
      - category: "smartphones"
        url: "https://www.interdiscount.ch/idocc/occ/id/products/search?currentPage=0&pageSize=100&query=:price-asc:categoryPath:/1/400/4100:categoryPath:/1/400/4100/411000:price_min:{min_price}:price_max:{max_price}:producttype411001k:Smartphone&lang=de"
        max_pages: 1
        fields:
          products: "products"
          title: "name"
          price: "productPriceData.prices.0.finalPrice.value"
          old_price: "productPriceData.prices.0.insteadPrice.value"
          url: "code"
        url_template: "https://www.interdiscount.ch/de/p/--p{id}"
        currency: "CHF"

  - name: "HopCash"
    source_type: "json"
    cleaner: "hopcash"
    headers:
      accept: "application/json"
    categories:
      - category: "smartphones"
        urls:
          - "https://hopcash.ch/214-iphone?q=Prix-CHF-{min_price}-{max_price}&order=product.price.asc&page={page}&from-xhr"
          - "https://hopcash.ch/263-samsung?q=Prix-CHF-{min_price}-{max_price}&order=product.price.asc&page={page}&from-xhr"
          - "https://hopcash.ch/491-autres-telephones?q=Prix-CHF-{min_price}-{max_price}&order=product.price.asc&page={page}&from-xhr"
        max_pages: 5
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        fields:
          products: "products"
          title: "name"
          price: "price_amount"
          old_price: "regular_price_amount"
          url: "link"
        currency: "CHF"

  - name: "Mediamarkt"
    source_type: "html"
    cleaner: "mediamarkt"
    base_url: "https://www.mediamarkt.ch"
    categories:
      - category: "smartphones"
        url: "https://www.mediamarkt.ch/de/category/smartphone-680815.html?filter=currentprice:{min_price}-{max_price}&sort=currentprice+asc&page={page}"
        max_pages: 5
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "[data-test='mms-product-card']"
          title: "[data-test='product-title']"
          price: "[data-test='mms-price'] span[aria-hidden='true']"
          old_price: "[data-test='mms-strike-price-type-rrp'] span[aria-hidden='true']"
          url: "a[href*='/de/product/']"
          image: "[data-test='product-image'][src]"
        currency: "CHF"

  - name: "mobilezone"
    source_type: "json"
    cleaner: "mobilezone"
    categories:
      - category: "smartphones"
        url: "https://search.epoq.de/inbound-servletapi/getSearchResult?full&ff=e:alloc_THEME&fv=Mobilegeraete_Alle_Handys&ff=g:price&fv=>{min_price}&ff=g:price&fv=<{max_price}&ff=e:isPriceVariant&fv=0&ff=e:isPriceVariant&fv=0&callback=X&tenantId=mobilezone-ch-2019&sessionId=7a8ffbd5f43f44f3946dd642a0e86a7&orderBy=e:sorting_price&order=asc&limit=100&offset=0&locakey=de-CH&style=compact&format=json&query="
        max_pages: 1
        jsonp_callback: "X"
        fields:
          products: "result.findings.finding"
          title: "match-item.g:description.$"
          price: "match-item.g:price.$"
          old_price: "match-item.g:old_price.$"
          url: "match-item.link.$"
        currency: "CHF"

  - name: "Orderflow"
    source_type: "html"
    cleaner: "orderflow"
    base_url: "https://www.orderflow.ch"
    categories:
      - category: "smartphones"
        url: "https://www.orderflow.ch/de/categories/elektronik/kommunikation/mobiltelefone?price-min={min_price}&price-max={max_price}&limit=100&sort=price%7Casc&c300101=%5B30010117%2C30010105%2C30010104%5D&page={page}"
        max_pages: 3
        pagination:
          type: "page_param"
          param: "page"
          start: 1
        selectors:
          product_card: "div.item.card"
          title_prefix: "h4 a strong"
          title: "img.img-fluid[alt]"
          price: "span.first_price span.price"
          old_price: "span.second_price span.price"
          url: "h4 a[href]"
          image: "img.img-fluid[src]"
        currency: "CHF"

  - name: "PostShop"
    source_type: "json"
    cleaner: "postshop"
    base_url: "https://shop.post.ch"
    headers:
      accept: "application/json"
    price_buckets:
      format: "%3Aprice%3ACHF+{start}-CHF+{end}"
      ranges:
        - { start: 0, end: 99.99 }
        - { start: 100, end: 199.99 }
        - { start: 200, end: 299.99 }
        - { start: 300, end: 399.99 }
        - { start: 400, end: 499.99 }
        - { start: 500, end: 599.99 }
        - { start: 600, end: 699.99 }
        - { start: 700, end: 799.99 }
        - { start: 800, end: 899.99 }
        - { start: 900, end: 999.99 }
        # - { start: 1000, end: 100000 }
    categories:
      - category: "smartphones"
        url: "https://apis.shop.post.ch/occ/v2/postshop-spa/products/search?fields=SEARCH&query=%3Aprice-asc%3AallCategories%3Amobiles{price_buckets}&pageSize=100&currentPage={page}&lang=de&curr=CHF"
        max_pages: 1
        pagination:
          type: "page_param"
          param: "page"
          start: 0
        fields:
          products: "products"
          title: "name"
          price: "price.value"
          url: "url"
          image: "images.0.url"
        currency: "CHF"
      - category: "notebooks"
        url: "https://apis.shop.post.ch/occ/v2/postshop-spa/products/search?fields=SEARCH&query=%3Aprice-asc%3AallCategories%3Anotebooks{price_buckets}&pageSize=100&currentPage={page}&lang=de&curr=CHF"
        max_pages: 8
        pagination:
          type: "page_param"
          param: "page"
          start: 0
        fields:
          products: "products"
          title: "name"
          price: "price.value"
          url: "url"
          image: "images.0.url"
        currency: "CHF"
      - category: "monitors"
        url: "https://apis.shop.post.ch/occ/v2/postshop-spa/products/search?fields=SEARCH&query=%3Aprice-asc%3AallCategories%3Amonitors{price_buckets}&pageSize=100&currentPage={page}&lang=de&curr=CHF"
        max_pages: 5
        pagination:
          type: "page_param"
          param: "page"
          start: 0
        fields:
          products: "products"
          title: "name"
          price: "price.value"
          url: "url"
          image: "images.0.url"
        currency: "CHF"
